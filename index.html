document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-speed=\"0.1\" style=\"position:relative;min-height:46vh;order:1\">\n      <div class=\"om-kb\" style=\"position:absolute;inset:-6%;background:radial-gradient(80% 80% at 45% 55%,rgba(196,90,50,.42),rgba(30,16,12,.96) 72%),repeating-linear-gradient(120deg,rgba(201,162,75,.07) 0 20px,rgba(201,162,75,.02) 20px 40px),linear-gradient(150deg,#3a1f15,#140b09)\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(270deg,rgba(22,13,11,.6),transparent 30%)\"><\u002Fdiv>\n      <span style=\"position:absolute;left:14px;bottom:14px;font:500 10.5px/1.4 ui-monospace,Menlo,monospace;letter-spacing:.04em;color:rgba(243,235,221,.72);background:rgba(20,10,8,.5);padding:6px 10px;border-radius:4px\">CRAFT · charcoal-grilling sai-oua, tongs, drifting smoke, glowing embers<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"position:relative;display:flex;align-items:center;padding:clamp(64px,8vw,110px) clamp(22px,5vw,80px);order:2\">\n      <div style=\"max-width:480px\">\n        <div class=\"om-rvxr\" style=\"margin-bottom:22px;color:#C9A24B\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"currentColor\" opacity=\"0.7\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><circle cx=\"12\" cy=\"4\" r=\"2\"><\u002Fcircle><circle cx=\"12\" cy=\"20\" r=\"2\"><\u002Fcircle><circle cx=\"4\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"20\" cy=\"12\" r=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h2 class=\"om-rvxr\" style=\"margin:0;font-family:'Anri',sans-serif;font-weight:700;font-size:clamp(32px,4.6vw,54px);line-height:1.05;color:#F3EBDD\">The Craft – <span style=\"color:#E7B9B0\">“ไส้อั่ว”<\u002Fspan><\u002Fh2>\n        <p class=\"om-rvxr\" style=\"margin:28px 0 0;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:clamp(14px,1.1vw,16.5px);line-height:2;color:rgba(243,235,221,.85)\">ไส้อั่วที่ผลิตด้วยมือในจำนวนจำกัดต่อวัน ทุกๆ เส้นจะต้องผ่านการปรุง ย่าง และพักอย่างเหมาะสม อีกทั้งยังคงค่อยๆ ย่างบนเตาถ่านด้วยมือเหมือนที่คุณแม่คำ 2) 0 14px,rgba(201,162,75,.03) 14px 28px),linear-gradient(150deg,#4a2e1c,#1c110d)\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(21,12,10,.55),transparent 30%)\"><\u002Fdiv>\n      <span style=\"position:absolute;left:14px;bottom:14px;font:500 10.5px/1.4 ui-monospace,Menlo,monospace;letter-spacing:.04em;color:rgba(243,235,221,.72);background:rgba(20,10,8,.5);padding:6px 10px;border-radius:4px\">PACKAGING · woven bamboo lantern + banana-leaf wrap, Lanna lattice pattern<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"preorder\" data-screen-label=\"Final CTA\" data-reveal=\"\" style=\"position:relative;min-height:96vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#140b09\">\n  <div class=\"om-px\" data-speed=\"0.2\" style=\"position:absolute;inset:-12% 0;z-index:0\">\n    <div class=\"om-kb\" style=\"position:absolute;inset:0;background:radial-gradient(110% 80% at 50% 40%,rgba(150,70,40,.5),rgba(20,11,9,.97) 75%),repeating-linear-gradient(125deg,rgba(122,34,34,.1) 0 24px,rgba(122,34,34,.03) 24px 48px),linear-gradient(170deg,#3a1612,#140b09)\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;inset:0;z-index:1;background:radial-gradient(80% 60% at 50% 50%,rgba(20,11,9,.35),rgba(20,11,9,.82))\"><\u002Fdiv>\n  <span style=\"position:absolute;left:14px;bottom:14px;z-index:3;font:500 10.5px/1.4 ui-monospace,Menlo,monospace;letter-spacing:.04em;color:rgba(243,235,221,.55);background:rgba(20,10,8,.45);padding:5px 9px;border-radius:4px\">BG · atmospheric red-foliage mountains at dusk, full-bleed<\u002Fspan>\n  <div style=\"position:relative;z-index:2;text-align:center;padding:clamp(70px,9vw,120px) clamp(22px,5vw,60px);max-width:980px\">\n    <p class=\"om-rv\" style=\"margin:0;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:clamp(16px,2.2vw,26px);color:rgba(243,235,221,.86)\">และคุณคือกลุ่มแรกที่ได้ลิ้มลองรสที่<\u002Fp>\n    <div class=\"om-big\" style=\"margin:10px 0 4px;font-family:'Anri',sans-serif;font-weight:700;font-size:clamp(46px,9vw,108px);line-height:1.04;color:#F3EBDD;text-shadow:0 6px 40px rgba(0,0,0,.5)\">“อธิบายไม่ได้นี้”<\u002Fdiv>\n    <div class=\"om-rv\" style=\"display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0 40px\">\n      <span style=\"width:clamp(40px,8vw,90px);height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,75,.7))\"><\u002Fspan>\n      <span style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(20px,2.6vw,30px);color:#D8BC7E;white-space:nowrap\">Early Access Batch<\u002Fspan>\n      <span style=\"width:clamp(40px,8vw,90px);height:1px;background:linear-gradient(90deg,rgba(201,162,75,.7),transparent)\"><\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"#\" class=\"om-cta-btn om-rv\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:18px;text-decoration:none;background:#7A2222;color:#F3EBDD;font-family:'Noto Sans Thai',sans-serif;font-weight:600;font-size:clamp(13px,1.4vw,15px);letter-spacing:.2em;padding:20px clamp(34px,5vw,60px);border-radius:2px;border:1px solid rgba(216,188,126,.35);box-shadow:0 18px 50px rgba(122,34,34,.45);transition:transform .35s cubic-bezier(.22,.61,.36,1),box-shadow .35s,background .35s\">PREORDER NOW<span class=\"om-arrow\" style=\"transition:transform .35s ease;font-size:1.2em\">→<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer class=\"om-foot\" data-screen-label=\"Footer\" style=\"position:relative;background:#0f0707;border-top:1px solid rgba(201,162,75,.18);padding:clamp(54px,7vw,86px) clamp(22px,5vw,80px) 36px\">\n  <div style=\"max-width:1320px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:40px 28px\">\n    <div style=\"grid-column:1/-1;max-width:340px\">\n      <div style=\"display:flex;flex-direction:column;line-height:1\"><span style=\"font-family:'Anri',sans-serif;font-weight:700;font-size:38px;color:#F3EBDD\">Anri<\u002Fspan><span style=\"font-family:'Noto Sans Thai',sans-serif;font-weight:500;font-size:9px;letter-spacing:.42em;color:rgba(216,188,126,.85);margin-top:4px;padding-left:2px\">BAKERY<\u002Fspan><\u002Fdiv>\n      <p style=\"margin:18px 0 0;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;line-height:1.5;color:rgba(243,235,221,.6)\">The untranslateble taste, baked in Chiang Mai.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Noto Sans Thai',sans-serif;font-weight:600;font-size:11px;letter-spacing:.18em;color:#C9A24B;margin-bottom:16px\">EXPLORE<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:11px\">\n        <sc-for list=\"{{ footA }}\" as=\"link\" hint-placeholder-count=\"4\"><a href=\"#\" style=\"text-decoration:none;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:13px;color:rgba(243,235,221,.72);transition:color .3s\">{{ link }}<\u002Fa><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Noto Sans Thai',sans-serif;font-weight:600;font-size:11px;letter-spacing:.18em;color:#C9A24B;margin-bottom:16px\">VISIT<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:11px\">\n        <sc-for list=\"{{ footB }}\" as=\"link\" hint-placeholder-count=\"4\"><a href=\"#\" style=\"text-decoration:none;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:13px;color:rgba(243,235,221,.72);transition:color .3s\">{{ link }}<\u002Fa><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-family:'Noto Sans Thai',sans-serif;font-weight:600;font-size:11px;letter-spacing:.18em;color:#C9A24B;margin-bottom:16px\">CONTACT<\u002Fdiv>\n      <p style=\"margin:0 0 16px;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:13px;line-height:1.8;color:rgba(243,235,221,.72)\">hello@anribakery.co<br>+66 2 000 0000<br>Nimmanhaemin, Chiang Mai<\u002Fp>\n      <div style=\"display:flex;gap:10px\">\n        <sc-for list=\"{{ socials }}\" as=\"s\" hint-placeholder-count=\"3\"><a href=\"#\" class=\"om-soc\" style=\"width:36px;height:36px;border-radius:50%;border:1px solid rgba(243,235,221,.25);display:flex;align-items:center;justify-content:center;text-decoration:none;font-family:'Noto Sans Thai',sans-serif;font-weight:600;font-size:11px;color:rgba(243,235,221,.8);transition:background .3s,color .3s,border-color .3s\">{{ s }}<\u002Fa><\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:1320px;margin:48px auto 0;padding-top:22px;border-top:1px solid rgba(243,235,221,.1);display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;font-family:'Noto Sans Thai',sans-serif;font-weight:300;font-size:11.5px;color:rgba(243,235,221,.45)\">\n    <span>© 2026 Anri Bakery. All rights reserved.<\u002Fspan>\n    <span>Sai Oua Campaign · Early Access<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { isMobile:false, menuOpen:false, lang:'TH', playing:false };\n\n  componentDidMount(){\n    this.reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this._mq = window.matchMedia('(max-width:860px)');\n    this._apply = () => this.setState({ isMobile: this._mq.matches });\n    this._apply();\n    this._mq.addEventListener('change', this._apply);\n\n    const io = new IntersectionObserver((entries)=>{\n      entries.forEach(e=>{\n        if(e.isIntersecting){ this._revealSection(e.target); }\n      });\n    }, { threshold:0.16, rootMargin:'0px 0px -8% 0px' });\n    this._io = io;\n    this._sections = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));\n    requestAnimationFrame(()=>{ this._sections.forEach(s=>io.observe(s)); this._revealCheck(); });\n\n    // Safety net: if neither IO nor scroll fires, force-reveal everything.\n    this._safety = setTimeout(()=>{ this._sections.forEach(s=>this._revealSection(s)); }, 1300);\n\n    this._nav = document.getElementById('om-nav');\n    this._prog = document.getElementById('om-prog');\n    this._px = Array.prototype.slice.call(document.querySelectorAll('.om-px'));\n    let ticking = false;\n    this._onScroll = () => {\n      if(ticking) return;\n      ticking = true;\n      requestAnimationFrame(()=>{ this._frame(); ticking = false; });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    window.addEventListener('resize', this._onScroll, { passive:true });\n    this._frame();\n  }\n\n  _revealSection(s){\n    if(!s || s._revealed) return;\n    s._revealed = true;\n    const items = s.querySelectorAll('.om-rv,.om-rvx,.om-rvxr,.om-big');\n    items.forEach((el,i)=>{ el.style.transitionDelay = (i*95)+'ms'; el.classList.add('in'); });\n    if(this._io) this._io.unobserve(s);\n  }\n\n  _revealCheck(){\n    if(!this._sections) return;\n    const vh = window.innerHeight;\n    this._sections.forEach(s=>{\n      if(s._revealed) return;\n      const r = s.getBoundingClientRect();\n      if(r.top < vh*0.88 && r.bottom > 0) this._revealSection(s);\n    });\n  }\n\n  _frame(){\n    this._revealCheck();\n    const y = window.scrollY || 0;\n    const h = document.documentElement.scrollHeight - window.innerHeight;\n    if(this._prog) this._prog.style.transform = 'scaleX(' + (h>0 ? Math.min(1, y/h) : 0) + ')';\n    if(this._nav) this._nav.classList.toggle('om-solid', y > 40);\n    if(!this.reduce && this._px){\n      const vh = window.innerHeight;\n      this._px.forEach(el=>{\n        const sp = parseFloat(el.getAttribute('data-speed')) || 0.15;\n        const r = el.parentElement.getBoundingClientRect();\n        const off = (r.top + r.height*0.5 - vh*0.5) * -sp;\n        el.style.transform = 'translate3d(0,' + off.toFixed(1) + 'px,0)';\n      });\n    }\n  }\n\n  componentWillUnmount(){\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n    if(this._mq) this._mq.removeEventListener('change', this._apply);\n    if(this._io) this._io.disconnect();\n    if(this._safety) clearTimeout(this._safety);\n  }\n\n  renderVals(){\n    return {\n      isMobile: this.state.isMobile,\n      notMobile: !this.state.isMobile,\n      menuOpen: this.state.menuOpen,\n      playing: this.state.playing,\n      notPlaying: !this.state.playing,\n      lang: this.state.lang,\n      navLinks: [\"ANRI'S SIGNATURE\",\"MENU\",\"PROMOTION\",\"ANRI'S STORY\",\"OUR SHOPS\",\"DELIVERY\",\"MEMBER\",\"CONTACT\"],\n      footA: [\"ANRI'S SIGNATURE\",\"MENU\",\"PROMOTION\",\"ANRI'S STORY\"],\n      footB: [\"OUR SHOPS\",\"DELIVERY\",\"MEMBER\",\"CONTACT\"],\n      socials: [\"FB\",\"IG\",\"LN\"],\n      toggleMenu: () => this.setState(s=>({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen:false }),\n      toggleLang: () => this.setState(s=>({ lang: s.lang==='TH' ? 'EN' : 'TH' })),\n      play: () => this.setState({ playing:true }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
